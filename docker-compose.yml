services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifyhub
      POSTGRES_USER: notifyhub
      POSTGRES_PASSWORD: notifyhub
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notifyhub -d notifyhub']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: runner
    command: ['sh', '-c', 'node dist/tools/migrate.js && node dist/apps/api/main.js']
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: postgres://notifyhub:notifyhub@postgres:5432/notifyhub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-compose-secret-change-before-production
      JWT_EXPIRES_IN_SECONDS: 900
      API_KEY_PEPPER: local-compose-api-key-pepper-change-before-production
      DELIVERY_MAX_ATTEMPTS: 3
      DELIVERY_RETRY_BACKOFF_MS: 5000
      CORS_ORIGIN: '*'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: runner
    command: ['node', 'dist/apps/worker/main.js']
    profiles: ['workers']
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgres://notifyhub:notifyhub@postgres:5432/notifyhub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-compose-secret-change-before-production
      JWT_EXPIRES_IN_SECONDS: 900
      API_KEY_PEPPER: local-compose-api-key-pepper-change-before-production
      DELIVERY_MAX_ATTEMPTS: 3
      DELIVERY_RETRY_BACKOFF_MS: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      target: runner
    command: ['node', 'dist/apps/scheduler/main.js']
    profiles: ['workers']
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgres://notifyhub:notifyhub@postgres:5432/notifyhub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-compose-secret-change-before-production
      JWT_EXPIRES_IN_SECONDS: 900
      API_KEY_PEPPER: local-compose-api-key-pepper-change-before-production
      DELIVERY_MAX_ATTEMPTS: 3
      DELIVERY_RETRY_BACKOFF_MS: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
